<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🚀 나만의 별로 가는 우주선</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#1a1fe8;font-family:'Nunito','Apple SD Gothic Neo',sans-serif;overflow-x:hidden}
:root{--dark:#0D1580;--green:#00A651;--yellow:#FFC907;--red:#E8242B;--orange:#FF6B35;--purple:#8B2FC9;--lb:#00AEEF;--blue:#2638C4}
.bg-fixed{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;animation:tw 2.5s infinite alternate;opacity:.14}
@keyframes tw{0%{transform:scale(1)}100%{transform:scale(1.6)}}
.app{position:relative;z-index:1;max-width:500px;margin:0 auto;padding-bottom:80px}
/* HEADER */
.hdr{background:var(--dark);padding:14px 16px 0;text-align:center}
.hdr-inner{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.hdr-rocket{font-size:34px;animation:bop 1.6s ease-in-out infinite}
@keyframes bop{0%,100%{transform:translateY(0)rotate(-5deg)}50%{transform:translateY(-8px)rotate(5deg)}}
.hdr-title{font-size:21px;font-weight:900;color:var(--yellow);text-shadow:0 3px 0 #060a50;letter-spacing:.5px}
.nav-row{display:flex;gap:8px;justify-content:center;padding-bottom:14px}
.nav-b{flex:1;max-width:135px;padding:10px 6px;border-radius:999px;border:3px solid var(--dark);font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;transition:transform .12s,box-shadow .12s;box-shadow:0 4px 0 var(--dark);text-align:center}
.nav-b span{display:block;font-size:18px;margin-bottom:2px}
.nav-b:active{transform:translateY(3px);box-shadow:0 1px 0 var(--dark)}
.nav-b.sel{background:var(--green);color:#fff;border-color:#005028}
.nav-b:not(.sel){background:var(--yellow);color:var(--dark)}
/* PAGES */
.page{display:none;padding:14px}.page.active{display:block}
/* STUDENT GRID */
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--yellow);border:3px solid var(--dark);border-radius:999px;padding:7px 18px;font-size:15px;font-weight:900;color:var(--dark);box-shadow:0 3px 0 var(--dark);margin:14px 0 12px}
.s-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.s-card{background:#fff;border:3px solid var(--dark);border-radius:20px;padding:14px 10px 12px;text-align:center;cursor:pointer;transition:transform .12s,box-shadow .12s;box-shadow:0 5px 0 var(--dark);position:relative;overflow:hidden}
.s-card:active{transform:translateY(4px);box-shadow:0 1px 0 var(--dark)}
.s-top-bar{position:absolute;top:0;left:0;right:0;height:8px;border-radius:17px 17px 0 0}
.s-av{width:52px;height:52px;border-radius:50%;border:3px solid var(--dark);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;margin:6px auto 7px}
.s-name{font-size:15px;font-weight:900;color:var(--dark);margin-bottom:4px}
.s-stars-sm{font-size:13px;margin-bottom:5px;min-height:18px}
.s-bar-bg{height:7px;background:#e4e4e4;border-radius:999px;overflow:hidden;border:2px solid #d0d0d0}
.s-bar-fill{height:100%;border-radius:999px}
/* BACK */
.back-btn{display:inline-flex;align-items:center;gap:7px;background:#fff;border:3px solid var(--dark);border-radius:999px;padding:8px 20px;font-size:15px;font-weight:900;color:var(--dark);cursor:pointer;font-family:inherit;box-shadow:0 4px 0 var(--dark);margin-bottom:14px;transition:transform .12s,box-shadow .12s}
.back-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--dark)}
/* HERO */
.s-hero{background:#fff;border:3px solid var(--dark);border-radius:22px;padding:13px 15px;margin-bottom:12px;display:flex;align-items:center;gap:13px;box-shadow:0 5px 0 var(--dark)}
.s-hero-av{width:58px;height:58px;border-radius:50%;border:3px solid var(--dark);display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:900;flex-shrink:0}
.s-hero-name{font-size:20px;font-weight:900;color:var(--dark)}
.s-hero-date{font-size:12px;font-weight:700;color:#777;margin-top:2px}
/* PROGRESS */
.prog-card{background:#fff;border:3px solid var(--dark);border-radius:20px;padding:13px 15px;margin-bottom:12px;box-shadow:0 5px 0 var(--dark)}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-num{font-size:28px;font-weight:900;color:var(--dark)}
.prog-lbl{font-size:13px;font-weight:800;color:#777}
.bar-wrap{position:relative;margin-bottom:14px}
.bar-bg{height:18px;background:#ebebeb;border-radius:999px;border:2.5px solid #d0d0d0;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--yellow));transition:width .5s}
.bar-marker{position:absolute;top:-4px;width:4px;height:26px;background:var(--red);border-radius:2px;left:70%;transform:translateX(-50%)}
.bar-marker-lbl{position:absolute;top:26px;left:70%;transform:translateX(-50%);font-size:11px;font-weight:900;color:var(--red);white-space:nowrap}
.mission-pill{padding:7px 14px;border-radius:999px;font-size:13px;font-weight:900;text-align:center}
.pill-ok{background:var(--green);color:#fff}
.pill-no{background:var(--yellow);color:var(--dark)}
.pill-done{background:#e0ffe0;color:var(--green);border:2px solid var(--green)}
/* TABS */
.tab-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-pill{flex-shrink:0;padding:8px 14px;border-radius:999px;border:3px solid var(--dark);background:#fff;font-size:13px;font-weight:900;color:var(--dark);cursor:pointer;font-family:inherit;box-shadow:0 3px 0 var(--dark);white-space:nowrap;transition:transform .1s,box-shadow .1s}
.tab-pill:active{transform:translateY(2px);box-shadow:0 1px 0 var(--dark)}
.tab-pill.active{background:var(--blue);color:#fff;border-color:#1020a0}
.tab-pill.done{border-color:var(--green)}
.tab-pill.done.active{background:var(--green);border-color:#005028}
/* SECTION */
.sec-card{background:#fff;border:3px solid var(--dark);border-radius:20px;padding:14px;margin-bottom:12px;box-shadow:0 5px 0 var(--dark)}
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-ico{width:46px;height:46px;border-radius:14px;border:3px solid var(--dark);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.sec-title{font-size:17px;font-weight:900;color:var(--dark)}
.sec-sub{font-size:12px;font-weight:700;color:#888;margin-top:2px}
.done-pill{font-size:11px;background:var(--green);color:#fff;border-radius:999px;padding:3px 9px;font-weight:900;margin-left:6px}
.ci-list{display:flex;flex-direction:column;gap:8px}
.ci{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;border:2.5px solid #ddd;background:#fafafa;cursor:pointer;user-select:none;transition:all .15s}
.ci:active{transform:scale(.98)}
.ci.checked{background:#edfff5;border-color:var(--green)}
.ci-box{width:28px;height:28px;border-radius:50%;border:2.5px solid #bbb;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:all .2s}
.ci.checked .ci-box{background:var(--green);border-color:var(--green);color:#fff}
.ci-lbl{font-size:15px;font-weight:800;color:#333;flex:1}
.ci.checked .ci-lbl{color:var(--green);text-decoration:line-through;text-decoration-color:var(--green)}
/* REWARD */
.reward-box{background:var(--dark);border:3px solid var(--yellow);border-radius:20px;padding:20px 16px;text-align:center;margin-bottom:12px;box-shadow:0 6px 0 #050840}
.reward-stars{font-size:44px;letter-spacing:6px;margin-bottom:8px;animation:pop .5s ease}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.reward-title{font-size:22px;font-weight:900;color:var(--yellow);text-shadow:0 2px 0 #050840;margin-bottom:5px}
.reward-desc{font-size:13px;font-weight:800;color:#8090ff;margin-bottom:10px}
.reward-badge{display:inline-block;background:var(--yellow);color:var(--dark);border:3px solid var(--dark);border-radius:999px;padding:7px 20px;font-size:14px;font-weight:900;box-shadow:0 3px 0 var(--dark);margin-bottom:14px}
.award-btn{display:block;width:100%;padding:14px;background:var(--green);border:3px solid #005028;border-radius:999px;font-size:18px;font-weight:900;color:#fff;cursor:pointer;font-family:inherit;box-shadow:0 5px 0 #005028;transition:transform .12s,box-shadow .12s}
.award-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #005028}
.already-box{background:#fff;border:3px solid var(--dark);border-radius:20px;padding:20px;text-align:center;margin-bottom:12px;box-shadow:0 5px 0 var(--dark)}
.already-ico{font-size:42px;margin-bottom:8px}
.already-txt{font-size:15px;font-weight:900;color:var(--dark)}
/* SHIP */
.ship-sec{background:var(--dark);border:3px solid var(--yellow);border-radius:20px;padding:14px;margin-bottom:12px;box-shadow:0 5px 0 #050840}
.ship-sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ship-sec-title{font-size:15px;font-weight:900;color:var(--yellow)}
.stars-chips{display:flex;flex-wrap:wrap;gap:3px}
.ship-canvas-row{display:flex;justify-content:center;align-items:flex-end;gap:14px;padding:.4rem 0}
.ship-stage-txt{font-size:12px;font-weight:800;color:#5060bb;text-align:center;margin-top:4px}
.ship-prog-bg{height:14px;background:#1a1f8a;border-radius:999px;border:2px solid var(--yellow);overflow:hidden;margin:8px 0 3px}
.ship-prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--purple),var(--yellow));transition:width .5s}
.ship-prog-lbl{font-size:11px;font-weight:900;color:#5060bb;text-align:right}
/* COSMOS */
.cosmos-outer{background:var(--dark);border:3px solid var(--yellow);border-radius:20px;padding:14px;box-shadow:0 6px 0 #050840;margin-top:14px}
.cosmos-title{font-size:22px;font-weight:900;color:var(--yellow);text-align:center;text-shadow:0 3px 0 #050840;margin-bottom:3px}
.cosmos-sub{font-size:13px;font-weight:800;color:#5060bb;text-align:center;margin-bottom:12px}
.cosmos-cvs-wrap{border-radius:14px;overflow:hidden;border:3px solid #1a2080}
.cosmos-legend{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.cl-chip{display:flex;align-items:center;gap:5px;background:#0d1260;border:2px solid #1a2080;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:900;color:#8090dd}
.cl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* SAVE BAR */
.save-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;display:none;justify-content:center;padding:12px 16px 18px;background:linear-gradient(transparent,#0a0fcc 40%);pointer-events:none}
.save-bar.visible{display:flex}
.save-btn-fixed{pointer-events:all;display:flex;align-items:center;gap:8px;background:#fff;border:3px solid var(--dark);border-radius:999px;padding:12px 28px;font-size:16px;font-weight:900;color:var(--dark);cursor:pointer;font-family:inherit;box-shadow:0 5px 0 var(--dark);transition:transform .12s,box-shadow .12s;white-space:nowrap}
.save-btn-fixed:active{transform:translateY(4px);box-shadow:0 1px 0 var(--dark)}
.save-btn-fixed .save-icon{font-size:20px}
.save-btn-fixed.saved{background:var(--green);color:#fff;border-color:#005028;box-shadow:0 5px 0 #005028}
/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%)translateY(80px);background:var(--yellow);color:var(--dark);padding:11px 24px;border-radius:999px;font-size:15px;font-weight:900;border:3px solid var(--dark);transition:transform .3s;white-space:nowrap;z-index:999;box-shadow:0 5px 0 var(--dark)}
.toast.show{transform:translateX(-50%)translateY(0)}

.admin-access{position:fixed;right:12px;bottom:82px;z-index:60;background:#fff;border:3px solid var(--dark);border-radius:999px;padding:9px 14px;font-size:13px;font-weight:900;color:var(--dark);font-family:inherit;cursor:pointer;box-shadow:0 4px 0 var(--dark)}
.admin-access:active{transform:translateY(3px);box-shadow:0 1px 0 var(--dark)}
.status-pill{display:none;margin:10px 14px 0;background:#fff4f4;border:2px solid var(--red);border-radius:14px;padding:8px 10px;font-size:12px;font-weight:800;color:var(--red);line-height:1.4}
.status-pill.show{display:block}
</style>
</head>
<body>
<button class="admin-access" onclick="openAdmin()">🔐 관리자</button>
<div class="status-pill" id="serverStatus"></div>
<div class="bg-fixed" id="bgF"></div>
<div class="toast" id="toast"></div>
<div class="save-bar" id="saveBar">
  <button class="save-btn-fixed" id="saveBtnFixed" onclick="saveSnapshot()">
    <span class="save-icon">💾</span> 오늘 활동 저장하기
  </button>
</div>
<div class="app">
  <div class="hdr">
    <div class="hdr-inner"><span class="hdr-rocket">🚀</span><div class="hdr-title">나만의 별로 가는 우주선!</div></div>
    <div class="nav-row">
      <button class="nav-b sel" id="nb-select" onclick="switchNav('select')"><span>👫</span>내 이름</button>
      <button class="nav-b" id="nb-cosmos" onclick="switchNav('cosmos')"><span>🌌</span>우리 반 우주</button>
    </div>
  </div>
  <div class="page active" id="pg-select">
    <div class="hero-badge">👇 내 이름을 눌러요!</div>
    <div class="s-grid" id="sGrid"></div>
  </div>
  <div class="page" id="pg-cl">
    <button class="back-btn" onclick="goBack()">← 돌아가기</button>
    <div class="s-hero" id="sHero"></div>
    <div class="prog-card">
      <div class="prog-top"><span class="prog-lbl">오늘 활동</span><span class="prog-num"><span id="clDone">0</span>/<span id="clTotal">0</span></span></div>
      <div class="bar-wrap">
        <div class="bar-bg"><div class="bar-fill" id="clBar" style="width:0%"></div></div>
        <div class="bar-marker"></div><div class="bar-marker-lbl">목표 70%</div>
      </div>
      <div class="mission-pill pill-no" id="clHint">조금만 더 하면 미션 성공!</div>
    </div>
    <div class="tab-row" id="clTabs"></div>
    <div id="clSection"></div>
    <div class="ship-sec">
      <div class="ship-sec-hd"><div class="ship-sec-title">🚀 나의 우주선</div><div class="stars-chips" id="clStars"></div></div>
      <div class="ship-canvas-row">
        <canvas id="clShip" width="100" height="112" style="image-rendering:pixelated"></canvas>
        <canvas id="clWorker" width="56" height="112" style="image-rendering:pixelated"></canvas>
      </div>
      <div class="ship-stage-txt" id="clShipTxt"></div>
      <div class="ship-prog-bg"><div class="ship-prog-fill" id="shipFill" style="width:0%"></div></div>
      <div class="ship-prog-lbl"><span id="shipP">0</span>/<span id="shipT">50</span> 조각 모음!</div>
    </div>
  </div>
  <div class="page" id="pg-cosmos">
    <div class="cosmos-outer">
      <div class="cosmos-title">🌌 우리 반의 우주</div>
      <div class="cosmos-sub" id="cosmosSub"></div>
      <div class="cosmos-cvs-wrap"><canvas id="cosmosC" width="470" height="300" style="width:100%;display:block"></canvas></div>
      <div class="cosmos-legend" id="cosmosLegend"></div>
    </div>
  </div>
</div>
<script>
const API_BASE=''; // Worker를 Pages와 같은 프로젝트에 연결하면 그대로 두세요. 별도 Worker URL을 쓰면 여기에 입력하세요.
function defaults(){return{totalPieces:50,rules:[{min:70,max:79,pieces:1},{min:80,max:99,pieces:2},{min:100,max:100,pieces:3}],sections:[
  {id:'morning',tab:'🌤 등교길',icon:'🌤',iconBg:'#FFF9E6',title:'등교길',sub:'학교 가기 전, 가는 길',items:['활동 1','활동 2','활동 3','활동 4']},
  {id:'school',tab:'🏫 학교',icon:'🏫',iconBg:'#E6F0FF',title:'학교 생활',sub:'수업, 쉬는 시간, 점심',items:['활동 1','활동 2','활동 3','활동 4','활동 5']},
  {id:'afternoon',tab:'🌇 하교길',icon:'🌇',iconBg:'#FFF0E6',title:'하교길',sub:'집으로 돌아오는 길',items:['활동 1','활동 2','활동 3']},
  {id:'home',tab:'🏠 집에서',icon:'🏠',iconBg:'#E6FFE6',title:'집에서',sub:'집에 온 후 저녁까지',items:['활동 1','활동 2','활동 3','활동 4','활동 5']}
],students:[]}}
let D=defaults();
let isSaving=false;
function seedStudents(){if(D.students.length===0){['김민준','이서연','박지호','최수아','정현우','강나은','윤도현','임하린','송재원','오채은','한승민','류지아','신동현','백서현','문준혁','홍예린','조민재','권서준','노지현','엄태양','방다인'].forEach((n,i)=>D.students.push({id:i+1,name:n,pieces:0,stars:0,history:[],snapshots:[],colorIdx:i%8,checks:{}}));}}
function normalizeD(){
  const base=defaults();
  if(!D||typeof D!=='object')D=base;
  if(!D.sections)D.sections=base.sections;if(!D.rules)D.rules=base.rules;if(!D.totalPieces)D.totalPieces=50;if(!D.students)D.students=[];
  D.students.forEach((s,i)=>{if(!s.id)s.id=i+1;if(!s.history)s.history=[];if(!s.snapshots)s.snapshots=[];if(!s.checks)s.checks={};if(s.colorIdx===undefined)s.colorIdx=i%8;if(s.pieces===undefined)s.pieces=0;if(s.stars===undefined)s.stars=0;});
}
function todayLocalKey(){const d=new Date();const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function setServerStatus(msg){const el=document.getElementById('serverStatus');if(!el)return;if(msg){el.textContent=msg;el.classList.add('show');}else{el.textContent='';el.classList.remove('show');}}
function shortErr(text){try{const j=JSON.parse(text);return j.fix||j.error||text}catch(_){return String(text).slice(0,160)}}
async function apiFetch(path,options={}){
  const res=await fetch(API_BASE+path,{headers:{'Content-Type':'application/json',...(options.headers||{})},...options});
  if(!res.ok){const t=await res.text();throw new Error(shortErr(t));}
  return res.json();
}
async function loadRemote(){
  try{const data=await apiFetch('/api/data');D=data&&data.state?data.state:data;normalizeD();seedStudents();setServerStatus('');}
  catch(e){console.error(e);normalizeD();seedStudents();setServerStatus('서버 연결 실패: Cloudflare D1 바인딩(DB) 또는 Functions 배포를 확인해 주세요. 현재는 임시 화면입니다.');toast('서버 연결 실패: 설정 확인 필요');}
}
function saveD(){
  isSaving=true;
  return apiFetch('/api/data',{method:'POST',body:JSON.stringify(D)})
    .then(()=>setServerStatus(''))
    .catch(e=>{console.error(e);setServerStatus('저장 실패: '+e.message);toast('저장 실패: 관리자에게 알려 주세요');})
    .finally(()=>{isSaving=false;});
}
function openAdmin(){
  const pw=prompt('관리자 비밀번호를 입력하세요.');
  if(pw===null)return;
  if(pw==='6435'){sessionStorage.setItem('admin_ok','1');location.href='admin.html';}
  else toast('비밀번호가 맞지 않아요');
}

const CC=[{top:'#8B2FC9',av:'#EEE8FF',ac:'#8B2FC9'},{top:'#00A651',av:'#E6FFE6',ac:'#00A651'},{top:'#E8242B',av:'#FFE6E6',ac:'#E8242B'},{top:'#2638C4',av:'#E6EEFF',ac:'#2638C4'},{top:'#FF6B35',av:'#FFF0E6',ac:'#FF6B35'},{top:'#00AEEF',av:'#E6F8FF',ac:'#007ab0'},{top:'#FFC907',av:'#FFF9E6',ac:'#8B6000'},{top:'#E8242B',av:'#FFE6E6',ac:'#E8242B'}];
const SC=['#8B2FC9','#00A651','#E8242B','#2638C4','#FF6B35','#00AEEF','#FFC907','#E8242B'];
const todayKey=todayLocalKey();
let curId=null,curTab=null,wTimer=null,wFrame=0;

function saveSnapshot(){
  const s=getS();if(!s)return;
  const now=new Date();
  const timeStr=now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  const dateStr=now.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'});
  const done=countDone(s),total=totalItems(),p=pctVal(s);
  const t=tc(s);
  const detail=D.sections.map(sec=>({
    title:sec.title,
    items:sec.items.map((item,i)=>({label:item,checked:!!t[sec.id+'_'+i]}))
  }));
  if(!s.snapshots)s.snapshots=[];
  // 오늘 날짜+시간 키로 저장 (같은 날 여러 번 저장 가능, 시간으로 구분)
  const snapKey=todayKey+'_'+now.getHours()+'_'+now.getMinutes();
  // 같은 분에 중복 저장 방지
  const already=s.snapshots.find(x=>x.key===snapKey);
  if(already){
    // 덮어쓰기
    already.done=done;already.total=total;already.pct=p;already.detail=detail;already.time=timeStr;
  } else {
    s.snapshots.push({key:snapKey,date:dateStr,time:timeStr,done,total,pct:p,detail});
  }
  // 최대 60개 보관
  if(s.snapshots.length>60)s.snapshots=s.snapshots.slice(-60);
  saveD();
  // 버튼 저장 완료 표시
  const btn=document.getElementById('saveBtnFixed');
  btn.classList.add('saved');btn.innerHTML='<span class="save-icon">✅</span> 저장됐어요!';
  setTimeout(()=>{btn.classList.remove('saved');btn.innerHTML='<span class="save-icon">💾</span> 오늘 활동 저장하기';},2000);
  toast('💾 활동 상황이 저장됐어요!');
}

function drawShip(c,stage,sc){const ctx=c.getContext('2d'),W=c.width,H=c.height;ctx.fillStyle='#04040f';ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,0.22)';[[12,14],[88,22],[18,94],[90,76],[6,56],[68,10]].forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill()});if(stage===0){ctx.strokeStyle='#1e1e5a';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(50,60,20,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#2a3060';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText('조각을',50,57);ctx.fillText('모아요!',50,70);return}const grey='#5A6478',silver='#B0BCC8',blue='#378ADD',fire='#FFC907',ox=50,oy=14;function ea(cx,cy,rx,ry,cl,a){ctx.globalAlpha=a;ctx.fillStyle=cl;ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}function rr(x,y,w,h,r,cl,a){ctx.globalAlpha=a;ctx.fillStyle=cl;ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();ctx.globalAlpha=1}function po(pts,cl,a){ctx.globalAlpha=a;ctx.fillStyle=cl;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));ctx.closePath();ctx.fill();ctx.globalAlpha=1}if(stage>=1){ea(ox,oy+54,20,7,grey,.75);rr(ox-10,oy+23,20,33,4,grey,1)}if(stage>=2)ea(ox,oy+24,15,22,silver,1);if(stage>=3){po([[ox-19,oy+56],[ox-10,oy+23],[ox-10,oy+56]],sc,.9);po([[ox+19,oy+56],[ox+10,oy+23],[ox+10,oy+56]],sc,.9)}if(stage>=4){ea(ox,oy+11,10,14,blue,.92);ea(ox,oy+4,6,6,blue,.55);ea(ox,oy+4,3,3,'#D8EEFF',.95)}if(stage>=5){ea(ox-10,oy+60,5,3,fire,.95);ea(ox+10,oy+60,5,3,fire,.95);ea(ox,oy+68,7,4,fire,.9)}}

function startW(stage,sc){stopW();function draw(){const c=document.getElementById('clWorker');if(!c){stopW();return}const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);const f=WF[wFrame%4],offX=1,offY=stage>=3?8:stage>=1?16:26;f.forEach(([cx,cy,col])=>{ctx.fillStyle=col;ctx.fillRect((offX+cx)*PX,(offY+cy)*PX,PX,PX)});wFrame++;}draw();wTimer=setInterval(draw,220);}
function drawNameStar(ctx,x,y,R,name,opt={}){
  const glowR=opt.big?R*2.3:R*1.9;
  const glow=ctx.createRadialGradient(x,y,2,x,y,glowR);
  glow.addColorStop(0,opt.big?'rgba(255,210,40,.85)':opt.sparkle?'rgba(255,220,60,.65)':'rgba(255,201,7,.45)');
  glow.addColorStop(.45,opt.big?'rgba(255,170,0,.35)':opt.sparkle?'rgba(255,201,7,.25)':'rgba(255,201,7,.12)');
  glow.addColorStop(1,'rgba(255,201,7,0)');
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(x,y,glowR,0,Math.PI*2);ctx.fill();

  if(opt.sparkle||opt.big){
    ctx.save();ctx.strokeStyle=opt.big?'rgba(255,235,120,.75)':'rgba(255,235,120,.55)';ctx.lineWidth=opt.big?1.7:1.1;
    const rays=opt.big?10:6;
    for(let i=0;i<rays;i++){
      const a=(i*360/rays+(opt.big?8:0))*Math.PI/180;
      const r1=R*(opt.big?1.28:1.15), r2=R*(opt.big?1.75:1.48);
      ctx.beginPath();ctx.moveTo(x+Math.cos(a)*r1,y+Math.sin(a)*r1);ctx.lineTo(x+Math.cos(a)*r2,y+Math.sin(a)*r2);ctx.stroke();
    }
    ctx.restore();
  }

  ctx.save();ctx.translate(x,y);ctx.beginPath();
  for(let i=0;i<10;i++){
    const a=(i*36-90)*Math.PI/180, r=i%2===0?R:R*.43;
    i===0?ctx.moveTo(r*Math.cos(a),r*Math.sin(a)):ctx.lineTo(r*Math.cos(a),r*Math.sin(a));
  }
  ctx.closePath();
  const g=ctx.createLinearGradient(-R,-R,R,R);
  g.addColorStop(0,'#FFF49A');g.addColorStop(.45,'#FFC907');g.addColorStop(1,opt.big?'#FF9F1C':'#F4A300');
  ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle=opt.big?'#FFE680':'#FFDE59';ctx.lineWidth=opt.big?3:2;ctx.stroke();
  ctx.strokeStyle='rgba(133,80,0,.32)';ctx.lineWidth=1;ctx.stroke();

  ctx.fillStyle='#7A3A00';
  ctx.textAlign='center';ctx.textBaseline='middle';
  const len=[...name].length;
  let fs=opt.big?13:R>=15?11:R>=12?9:8;
  if(len>=4)fs-=1;if(len>=5)fs-=1;
  ctx.font=`900 ${Math.max(7,fs)}px 'Apple SD Gothic Neo', sans-serif`;
  ctx.fillText(name,0,1);
  ctx.restore();
}

function renderCosmos(){
  const total=D.students.reduce((a,s)=>a+(Number(s.stars)||0),0);
  document.getElementById('cosmosSub').textContent=`우리 반이 모은 별 총 ${total}개! ✨`;
  const c=document.getElementById('cosmosC'),ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.fillStyle='#03061d';ctx.fillRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#03061d');bg.addColorStop(.45,'#10116a');bg.addColorStop(1,'#230b56');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  const grd=ctx.createRadialGradient(W*.63,H*.42,10,W*.63,H*.42,210);
  grd.addColorStop(0,'rgba(139,47,201,.38)');grd.addColorStop(.45,'rgba(38,56,196,.22)');grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  for(let i=0;i<140;i++){
    const x=(i*173+7)%W,y=(i*97+13)%H,r=i%11===0?1.8:i%5===0?1.2:.55,op=.10+(i%7)*.045;
    ctx.fillStyle=`rgba(255,255,255,${op})`;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  // 장식 행성
  ctx.globalAlpha=.35;ctx.fillStyle='#7f5cff';ctx.beginPath();ctx.arc(28,H-38,42,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#a99cff';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(28,H-38,58,13,-.15,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#ff8c2a';ctx.beginPath();ctx.arc(W-32,H-42,12,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

  const stars=[];
  D.students.forEach((s,si)=>{
    const n=Math.max(0,Number(s.stars)||0);
    for(let k=0;k<n;k++)stars.push({s,si,k,total:n});
  });
  const placed=[];
  stars.forEach((it,idx)=>{
    const n=it.total;
    const big=n>=10, sparkle=n>=5;
    const R=big?22:(sparkle?16:(n===1?12:14));
    let px,py,tries=0;
    do{
      px=R+12+((idx*83+it.si*37+tries*29)%Math.max(1,W-(R+12)*2));
      py=R+14+((idx*61+it.si*53+tries*43)%Math.max(1,H-(R+16)*2));
      tries++;
    }while(tries<80&&placed.some(p=>Math.hypot(p.x-px,p.y-py)<(p.r+R+8)));
    placed.push({x:px,y:py,r:R});
    drawNameStar(ctx,px,py,R,it.s.name,{sparkle,big});
  });
  if(!total){
    ctx.fillStyle='#dce4ff';ctx.font='bold 15px sans-serif';ctx.textAlign='center';ctx.fillText('아직 별이 없어요!',W/2,H/2);
    ctx.fillStyle='#8090dd';ctx.font='bold 12px sans-serif';ctx.fillText('조각을 모아 첫 번째 별을 받아요!',W/2,H/2+22);
  }
  document.getElementById('cosmosLegend').innerHTML=`<div class="cl-chip"><div class="cl-dot" style="background:#FFC907"></div>별 1개: 작은 별</div><div class="cl-chip"><div class="cl-dot" style="background:#FFC907"></div>별 2~4개: 개수만큼 표시</div><div class="cl-chip"><div class="cl-dot" style="background:#FFE680"></div>별 5개 이상: 반짝임</div><div class="cl-chip"><div class="cl-dot" style="background:#FF9F1C"></div>별 10개 이상: 큰 황금별</div>`;
}
initApp();

async function initApp(){await loadRemote();renderGrid();}
</script>
